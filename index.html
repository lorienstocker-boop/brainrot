<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Brainrot Pack Simulator</title>

  <link rel="icon" href="meep (2).ico">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      padding: 30px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      margin: 5px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover { transform: scale(1.05); }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 15px;
      padding: 15px;
      margin: 10px auto;
      width: 320px;
    }

    #packVideo, #squishVideo {
      transition: transform 0.2s;
    }

    #packVideo:hover { transform: scale(1.1); }
  </style>
</head>

<body>

<h1>Brainrot Pack Simulator</h1>

<button onclick="Game.openPack()">Open Pack</button>
<button onclick="Game.claimDaily()">Free Daily Pack</button>

<p>Packs: <span id="packs">0</span></p>
<p id="timer"></p>

<h2>Global Shelf</h2>
<button onclick="Shelf.load()">Refresh</button>
<div id="shelf"></div>

<video id="packVideo" width="400" style="display:none;">
  <source src="videos/opening.mp4">
</video>

<div id="result"></div>
<img id="cardImg" style="display:none; max-width:250px;">

<div id="inventory"></div>

<script>
/* =========================
   STORAGE MODULE
========================= */
const Storage = {
  get(key, fallback) {
    try {
      return JSON.parse(localStorage.getItem(key)) ?? fallback;
    } catch {
      return fallback;
    }
  },

  set(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }
};

/* =========================
   SUPABASE MODULE
========================= */
const SupabaseClient = (() => {
  const client = window.supabase.createClient(
    "https://istttzdbafsurjrefdwm.supabase.co",
    "sb_publishable_4bjO8-2p6WIw0XxU8zDg9Q_Ydpffo8t"
  );

  return {
    async addCard(card) {
      await client.from("shelf").insert([card]);
    },

    async getShelf() {
      const { data } = await client
        .from("shelf")
        .select("*")
        .order("id", { ascending: false });

      return data || [];
    }
  };
})();

/* =========================
   GAME DATA
========================= */
const Cards = {
  epic: { "tralalero tralala": "epic" },
  insane: { "apple pen dude": "insane" },
  rare: {
    "ballerina cappucina": "rare",
    "cappucino assassino": "rare"
  },
  uncommon: {
    "bombardino crocodilo": "uncommon",
    "tung tung tung sahur": "uncommon"
  },
  common: {
    "tripi tropi": "common",
    "skibidi": "common"
  }
};

/* =========================
   GAME STATE
========================= */
const State = {
  packs: Storage.get("packs", 0),
  coins: Storage.get("coins", 60),
  inventory: Storage.get("inv", []),
  lastDaily: Storage.get("daily", 0)
};

function save() {
  Storage.set("packs", State.packs);
  Storage.set("coins", State.coins);
  Storage.set("inv", State.inventory);
  Storage.set("daily", State.lastDaily);
}

/* =========================
   GAME LOGIC
========================= */
function getRandomCard() {
  const roll = Math.random();

  let pool =
    roll < 0.03 ? Cards.insane :
    roll < 0.08 ? Cards.epic :
    roll < 0.18 ? Cards.rare :
    roll < 0.58 ? Cards.uncommon :
    Cards.common;

  const keys = Object.keys(pool);
  const name = keys[Math.floor(Math.random() * keys.length)];

  return { name, rarity: pool[name] };
}

function rarityValue(r) {
  return { common: 10, uncommon: 25, rare: 60, epic: 150, insane: 500 }[r] || 10;
}

/* =========================
   INVENTORY MODULE
========================= */
const Inventory = {
  add(card) {
    State.inventory.push(card);
    save();
    this.render();
  },

  render() {
    const div = document.getElementById("inventory");

    div.innerHTML = `<h2>Inventory</h2><p>Coins: ${State.coins}</p>`;

    State.inventory.forEach((c, i) => {
      div.innerHTML += `
        <div class="cardBox">
          <h3>${c.name}</h3>
          <p>${c.rarity}</p>
          <button onclick="Inventory.sell(${i})">sell</button>
        </div>
      `;
    });
  },

  sell(i) {
    State.coins += rarityValue(State.inventory[i].rarity);
    State.inventory.splice(i, 1);
    save();
    this.render();
  }
};

/* =========================
   SHELF MODULE
========================= */
const Shelf = {
  async add(card) {
    try {
      await SupabaseClient.addCard(card);
    } catch (e) {
      console.log(e);
    }
  },

  async load() {
    const data = await SupabaseClient.getShelf();

    const div = document.getElementById("shelf");
    div.innerHTML = "";

    data.forEach(item => {
      div.innerHTML += `
        <div class="cardBox">
          <h3>${item.name}</h3>
          <p>${item.rarity}</p>
        </div>
      `;
    });
  }
};

/* =========================
   GAME MODULE
========================= */
const Game = {
  openPack(free = false) {

    if (!free) {
      if (State.coins < 20) return alert("Not enough coins");
      State.coins -= 20;
    }

    const card = getRandomCard();

    State.packs++;
    save();

    document.getElementById("packs").innerText = State.packs;

    const video = document.getElementById("packVideo");
    const result = document.getElementById("result");
    const img = document.getElementById("cardImg");

    result.innerText = "";
    img.style.display = "none";

    video.style.display = "block";
    video.currentTime = 0;
    video.play();

    video.onended = async () => {
      video.style.display = "none";

      result.innerText = `You got ${card.name} (${card.rarity})`;
      img.src = `images/${card.name}.png`;
      img.style.display = "block";

      Inventory.add(card);
      await Shelf.add(card);
    };
  },

  claimDaily() {
    const now = Date.now();

    if (now - State.lastDaily < 86400000) {
      return alert("Come back later!");
    }

    State.lastDaily = now;
    save();
    this.openPack(true);
  }
};

/* =========================
   INIT
========================= */
Inventory.render();
Shelf.load();

setInterval(() => {
  const el = document.getElementById("timer");
  const left = 86400000 - (Date.now() - State.lastDaily);

  el.innerText = left <= 0
    ? "Daily ready!"
    : `Next daily in ${Math.floor(left/3600000)}h`;
}, 1000);

document.getElementById("packs").innerText = State.packs;

</script>

</body>
</html>
