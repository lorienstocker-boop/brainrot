<!DOCTYPE html>
<html>

<head>
  <link rel="icon" href="meep (2).ico">
  <title>brainrot booster pack opening simulation</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      padding: 30px;
    }

    #packVideo, #squishVideo {
      transition: transform 0.2s;
    }

    #packVideo:hover {
      transform: scale(1.1);
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    img {
      margin-top: 20px;
      max-width: 300px;
      border-radius: 12px;
    }

    #result {
      font-size: 24px;
      margin-top: 25px;
    }

    #inventory {
      margin-top: 40px;
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 15px;
      padding: 15px;
      margin: 15px auto;
      width: 350px;
    }

    p, h1, h2, h3, span {
      transition: transform 0.15s ease, text-shadow 0.15s ease;
      display: inline-block;
    }

    p:hover, h1:hover, h2:hover, h3:hover, span:hover {
      transform: scale(1.08);
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>

<h1>brainrot booster pack opening simulation</h1>

<button onclick="openPack()">Open Pack</button>
<button onclick="claimDailyPack()">Free Daily Pack!!! :3</button>

<p>total packs opened: <span id="count">0</span></p>
<p id="dailyTimer"></p>

<h2>Global Shelf</h2>
<button onclick="loadShelf()">Refresh Shelf</button>
<div id="shelf"></div>

<video id="packVideo" width="500" style="display:none;">
  <source src="videos/opening.mp4" type="video/mp4">
</video>

<video id="squishVideo" width="500" style="display:none;">
  <source src="videos/squish.mp4" type="video/mp4">
</video>

<div id="result"></div>
<div id="outcome"></div>

<img id="cardImage" src="" style="display:none;">

<div id="inventory">
  <h2>Inventory</h2>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://istttzdbafsurjrefdwm.supabase.co",
  "sb_publishable_4bjO8-2p6WIw0XxU8zDg9Q_Ydpffo8t"
);

let packsOpened = parseInt(localStorage.getItem("packsOpened")) || 0;
let inventory = JSON.parse(localStorage.getItem("inventory") || "[]");
let coins = parseInt(localStorage.getItem("coins")) || 60;

document.getElementById("count").textContent = packsOpened;

const DAILY_COOLDOWN = 24 * 60 * 60 * 1000;

// CARDS
const epicCards = { "tralalero tralala": "epic" };
const insaneCards = { "apple pen dude": "insane" };
const rareCards = {
  "ballerina cappucina": "rare",
  "cappucino assassino": "rare"
};
const uncommonCards = {
  "bombardino crocodilo": "uncommon",
  "tung tung tung sahur": "uncommon"
};
const commonCards = {
  "tripi tropi": "common",
  "skibidi": "common"
};

// SAFE SHELF
async function addToShelf(card) {
  try {
    await supabase.from("shelf").insert([
      { name: card.name, rarity: card.rarity }
    ]);
  } catch (err) {
    console.log("Shelf insert error:", err);
  }
}

async function loadShelf() {
  const { data, error } = await supabase
    .from("shelf")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log("Shelf load error:", error);
    return;
  }

  const shelfDiv = document.getElementById("shelf");
  shelfDiv.innerHTML = "";

  (data || []).forEach(item => {
    shelfDiv.innerHTML += `
      <div class="cardBox">
        <h3>${item.name}</h3>
        <p>${item.rarity}</p>
      </div>
    `;
  });
}

// GAME SAVE
function saveGame() {
  localStorage.setItem("inventory", JSON.stringify(inventory));
  localStorage.setItem("coins", coins);
  localStorage.setItem("packsOpened", packsOpened);
}

function chooseRandomCard(cards) {
  const keys = Object.keys(cards);
  const name = keys[Math.floor(Math.random() * keys.length)];
  return { name, rarity: cards[name] };
}

function getCardValue(rarity) {
  return {
    common: 10,
    uncommon: 25,
    rare: 60,
    epic: 150,
    insane: 500
  }[rarity] || 10;
}

function addCardToInventory(card) {
  inventory.push(card);
  saveGame();
  renderInventory();
}

function sellCard(index) {
  coins += getCardValue(inventory[index].rarity);
  inventory.splice(index, 1);
  saveGame();
  renderInventory();
}

function squishCard() {
  const video = document.getElementById("squishVideo");
  video.style.display = "block";
  video.currentTime = 0;
  video.play();
  video.onended = () => video.style.display = "none";
}

function renderInventory() {
  const div = document.getElementById("inventory");

  div.innerHTML = `
    <h2>Inventory</h2>
    <h3>Coins: ${coins}</h3>
  `;

  inventory.forEach((card, i) => {
    let btn = `<button onclick="sellCard(${i})">sell</button>`;
    if (card.name === "tung tung tung sahur") {
      btn += `<button onclick="squishCard()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <h3>${card.name}</h3>
        <p>${card.rarity}</p>
        ${btn}
      </div>
    `;
  });
}

// DAILY
function updateDailyTimer() {
  const el = document.getElementById("dailyTimer");
  const last = localStorage.getItem("lastDailyPack");

  if (!last) {
    el.innerText = "daily pack: ready!";
    return;
  }

  const t = DAILY_COOLDOWN - (Date.now() - parseInt(last));

  if (t <= 0) {
    el.innerText = "daily pack: ready!";
    return;
  }

  const h = Math.floor(t / 3600000);
  const m = Math.floor((t % 3600000) / 60000);
  const s = Math.floor((t % 60000) / 1000);

  el.innerText = `next daily pack in ${h}h ${m}m ${s}s`;
}

function canClaimDaily() {
  const last = localStorage.getItem("lastDailyPack");
  return !last || Date.now() - parseInt(last) > DAILY_COOLDOWN;
}

function claimDailyPack() {
  if (!canClaimDaily()) return alert("come back later!");
  localStorage.setItem("lastDailyPack", Date.now());
  openPack(true);
}

// PACK
function openPack(free = false) {

  if (!free) {
    if (coins < 20) return alert("not enough coins");
    coins -= 20;
  }

  const roll = Math.random();
  let pool =
    roll < 0.03 ? insaneCards :
    roll < 0.08 ? epicCards :
    roll < 0.18 ? rareCards :
    roll < 0.58 ? uncommonCards :
    commonCards;

  const card = chooseRandomCard(pool);

  packsOpened++;
  document.getElementById("count").textContent = packsOpened;

  saveGame();

  const video = document.getElementById("packVideo");
  const result = document.getElementById("result");
  const img = document.getElementById("cardImage");
  const outcome = document.getElementById("outcome");

  result.innerText = "";
  outcome.innerText = "";
  img.style.display = "none";

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = async () => {

    video.style.display = "none";

    await addToShelf(card);
    addCardToInventory(card);

    result.innerText = `You got ${card.name} (${card.rarity})`;

    img.src = `images/${card.name}.png`;
    img.style.display = "block";

    const v = getCardValue(card.rarity);

    outcome.innerText =
      v >= 500 ? "SUPER WIN!!!!!!" :
      v < 20 ? "LOSE" : "WIN!";

    outcome.style.color =
      v >= 500 ? "gold" :
      v < 20 ? "red" : "lime";
  };
}

// INIT
renderInventory();
updateDailyTimer();
setInterval(updateDailyTimer, 1000);
loadShelf();

</script>

</body>
</html>
