<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Brainrot Pack Simulator</title>

  <link rel="icon" href="meep (2).ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .main {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .panel {
      background: rgba(0,0,0,0.35);
      padding: 20px;
      border-radius: 15px;
      width: 420px;
      backdrop-filter: blur(6px);
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin: 5px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #packVideo, #squishVideo {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px 0;
    }

    #shelfContainer {
      position: relative;
      width: 700px;
      margin: 20px auto;
    }

    #shelfImg {
      width: 100%;
      display: block;
    }

    #shelfItems {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>brainrot pack opening simulator</h1>
  <p>Packs: <span id="packs">0</span></p>
  <p id="timer"></p>
</div>

<div class="main">


  <div class="panel">
    <h2>brainrot pack opening simulator</h2>

    <button onclick="Game.openPack()">Open Pack</button>
    <button onclick="Game.claimDaily()">Free Daily Pack</button>

    <video id="packVideo" style="display:none;">
      <source src="videos/opening.mp4">
    </video>

    <div id="result"></div>
    <img id="cardImg" style="display:none; max-width:250px;">
  </div>


  <div class="panel">
    <h2>inventory</h2>
    <div id="inventory"></div>
  </div>

</div>


<div class="panel" style="width: 700px; margin: auto;">
  <h2>global shelf</h2>
  <button onclick="Shelf.load()">refresh shelf</button>

  <div id="shelf"></div>

  <div id="shelfContainer">
    <img src="images/shelf.png" id="shelfImg">
    <div id="shelfItems"></div>
  </div>
</div>


<video id="squishVideo" style="display:none;">
  <source src="videos/squish.mp4">
</video>

<script>


const supabase = window.supabase.createClient(
  "https://istttzdbafsurjrefdwm.supabase.co",
  "sb_publishable_4bjO8-2p6WIw0XxU8zDg9Q_Ydpffo8t"
);


let packs = parseInt(localStorage.getItem("packs")) || 0;
let coins = 60;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");

document.getElementById("packs").innerText = packs;


const Cards = {
  epic: { "tralalero tralala": "epic" },
  insane: { "apple pen dude": "insane" },
  rare: {
    "ballerina cappucina": "rare",
    "cappucino assassino": "rare"
  },
  uncommon: {
    "bombardino crocodilo": "uncommon",
    "tung tung tung sahur": "uncommon"
  },
  common: {
    "skibidi": "common",
    "tripi tropi": "common"
  }
};

function randomCard() {
  let roll = Math.random();
  let pool =
    roll < 0.03 ? Cards.insane :
    roll < 0.08 ? Cards.epic :
    roll < 0.18 ? Cards.rare :
    roll < 0.58 ? Cards.uncommon :
    Cards.common;

  let keys = Object.keys(pool);
  let name = keys[Math.floor(Math.random() * keys.length)];
  return { name, rarity: pool[name] };
}

function value(r) {
  return { common:10, uncommon:25, rare:60, epic:150, insane:500 }[r];
}


function renderInventory() {
  const div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((c, i) => {
    let btn = `<button onclick="sell(${i})">sell</button>`;

    if (c.name === "tung tung tung sahur") {
      btn += `<button onclick="squish()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <b>${c.name}</b><br>
        ${c.rarity}<br>
        ${btn}
      </div>
    `;
  });
}

function sell(i) {
  coins += value(inventory[i].rarity);
  inventory.splice(i,1);
  save();
  renderInventory();
}


function squish() {
  const v = document.getElementById("squishVideo");
  v.style.display = "block";
  v.currentTime = 0;
  v.play();
  v.onended = () => v.style.display = "none";
}


async function addToShelf(card) {
  await supabase.from("shelf").insert([card]);
}

async function loadShelf() {
  const { data } = await supabase.from("shelf").select("*");

  const div = document.getElementById("shelf");
  div.innerHTML = "";

  (data || []).forEach((item, i) => {
    div.innerHTML += `
      <div style="
        position:absolute;
        left:${(i%5)*120}px;
        top:${Math.floor(i/5)*140}px;
        width:100px;
        background:#222;
        border:2px solid white;
        border-radius:10px;
        padding:5px;
        font-size:12px;
      ">
        ${item.name}
      </div>
    `;
  });
}


function openPack() {
  const card = randomCard();

  packs++;
  localStorage.setItem("packs", packs);
  document.getElementById("packs").innerText = packs;

  inventory.push(card);
  localStorage.setItem("inv", JSON.stringify(inventory));
  renderInventory();

  addToShelf(card);

  document.getElementById("result").innerText =
    `You got ${card.name} (${card.rarity})`;
}


renderInventory();
loadShelf();
setInterval(loadShelf, 4000);

</script>

</body>
</html>
