<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>brainrot opener - game</title>

  <link rel="icon" href="meep (2).ico">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      text-align: center;
    }

    body.premium {
      background: url("images__1_-removebg-preview.png") center/cover no-repeat;
    }

    h1 { margin-top: 20px; }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover { transform: scale(1.05); }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px auto;
      width: 280px;
    }

    #shelfContainer {
      width: 700px;
      margin: 20px auto;
      position: relative;
    }

    #shelfScroll {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      overflow-y: auto;
      max-height: 300px;
      padding: 10px;
    }

    #packVideo, #squishVideo {
      display: none;
      margin: 10px auto;
    }

    #squishVideo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      z-index: 9999;
    }
  </style>
</head>

<body>

<h1>brainrot pack opening simulator</h1>

<button onclick="login()">login</button>
<button onclick="signup()">signup</button>

<button onclick="openPack()">open pack</button>
<button onclick="claimDaily()">claim daily pack</button>

<p>coins: <span id="coins">60</span></p>
<p>packs opened: <span id="count">0</span></p>

<h2>inventory</h2>
<div id="inventory"></div>

<h2>global shelf</h2>
<div id="shelfContainer">
  <div id="shelfScroll"></div>
</div>

<video id="squishVideo" controls>
  <source src="videos/squish.mp4">
</video>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>


const supabase = window.supabase.createClient(
  "sb_publishable_gLm5gfbV-rPIDIO3a-Hk8w_Is-xtM2-",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1ampxanlkcGpsdnBzdXJvZ295Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNTU4MTYsImV4cCI6MjA5NTgzMTgxNn0.7ncfGMpeqC8yGO_DEy6ycx-RzsdUQwmNC_hq4CxVn5U"
);


let user = null;
let coins = 60;
let inventory = [];
let packs = 0;
let lastDaily = 0;

const DAILY = 11 * 60 * 60 * 1000;


async function signup() {
  let email = prompt("email");
  let password = prompt("password");

  const { error } = await supabase.auth.signUp({ email, password });

  alert(error ? "signup failed" : "account created");
}

async function login() {
  let email = prompt("email");
  let password = prompt("password");

  const { data, error } =
    await supabase.auth.signInWithPassword({ email, password });

  if (error) return alert("login failed :O");

  user = data.user;

  await loadData();
}


async function loadData() {
  if (!user) return;

  let { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if (!profile) {
    await supabase.from("profiles").insert({
      id: user.id,
      coins: 60,
      premium: false
    });

    coins = 60;
  } else {
    coins = profile.coins;
  }

  let { data } = await supabase
    .from("inventory")
    .select("*")
    .eq("user_id", user.id);

  inventory = data || [];

  updateUI();
  renderInventory();
  renderShelf();
}


async function saveCoins() {
  if (!user) return;

  await supabase
    .from("profiles")
    .update({ coins })
    .eq("id", user.id);
}

  
function openPack() {
  if (!user) return alert("login first");
  if (coins < 10) return alert("not enough coins");

  coins -= 10;
  packs++;

  saveCoins();
  updateUI();

  let card = {
    name: "skibidi",
    rarity: "common"
  };

  supabase.from("inventory").insert({
    user_id: user.id,
    item_name: card.name,
    rarity: card.rarity
  }).then(loadData);
}


function claimDaily() {
  let now = Date.now();

  if (now - lastDaily < DAILY) {
    alert("come back later");
    return;
  }

  lastDaily = now;
  openPack();
}


function squish() {
  const video = document.getElementById("squishVideo");

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {
    video.style.display = "none";
  };
}


function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("count").innerText = packs;
}

function renderInventory() {
  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach(c => {
    div.innerHTML += `
      <div class="cardBox">
        <b>${c.item_name}</b><br>
        ${c.rarity}
      </div>
    `;
  });
}

function renderShelf() {
  let div = document.getElementById("shelfScroll");
  div.innerHTML = "";

  inventory.forEach(c => {
    div.innerHTML += `<div class="cardBox">${c.item_name}</div>`;
  });
}

</script>

</body>
</html>
