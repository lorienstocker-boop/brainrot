<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>brainrot pack simulator</title>

  <link rel="icon" href="meep (2).ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .main {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .panel {
      background: rgba(0,0,0,0.35);
      padding: 20px;
      border-radius: 15px;
      width: 420px;
      backdrop-filter: blur(6px);
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin: 5px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #packVideo, #squishVideo {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px 0;
    }

  

    #shelfContainer {
      position: relative;
      width: 700px;
      height: 500px;
      margin: 20px auto;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #shelfContainer::-webkit-scrollbar {
      display: none;
    }

    #shelfImg {
      width: 100%;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #shelfItems {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-wrap: nowrap;
      width: max-content;
      z-index: 1;
      padding-top: 40px;
    }

    .shelfItem {
      width: 90px;
      height: 110px;
      background: #222;
      border: 2px solid white;
      border-radius: 10px;
      padding: 5px;
      margin: 10px;
      text-align: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    p, h1, h2, h3, span {
      transition: transform 0.15s ease, text-shadow 0.15s ease;
      display: inline-block;
    }

    p:hover, h1:hover, h2:hover, h3:hover, span:hover {
      transform: scale(1.08);
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

  </style>
</head>

<body>

<div class="header">
  <h1>brainrot pack opening simulator</h1>
</div>

<div class="main">

  <div class="panel">
    <h2>packs</h2>
    <button onclick="openPack()">open 1 pack</button>

    <video id="packVideo" style="display:none;">
      <source src="videos/opening.mp4">
    </video>

    <img id="cardImg" style="display:none; max-width:250px;">
    <div id="result"></div>
  </div>

</div>

<div class="panel" style="width:700px; margin:auto;">
  <h2>global shelf</h2>

  <button onclick="loadShelf()">refresh shelf</button>

  <div id="shelfContainer">
    <img src="images/shelf.png" id="shelfImg">
    <div id="shelfItems"></div>
  </div>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://istttzdbafsurjrefdwm.supabase.co",
  "sb_publishable_4bjO8-2p6WIw0XxU8zDg9Q_Ydpffo8t"
);



let shelfData = [];

async function loadShelf() {

  const { data, error } =
    await supabaseClient
      .from("shelf")
      .select("*")
      .order("id", { ascending: false });

  if (error) return console.log(error);

  shelfData = data || [];

  const div = document.getElementById("shelfItems");

  div.innerHTML = "";


  const loop = shelfData.concat(shelfData);

  loop.forEach(item => {
    div.innerHTML += `
      <div class="shelfItem">
        ${item.name}
      </div>
    `;
  });
}


const container = document.getElementById("shelfContainer");

setInterval(() => {
  const half = container.scrollWidth / 2;

  if (container.scrollLeft >= half) {
    container.scrollLeft = 0;
  }
}, 50);

</script>

</body>
</html>
