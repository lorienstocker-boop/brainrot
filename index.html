<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>brainrot pack opening simulator</title>

  <link rel="icon" href="meep (2).ico">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      text-align: center;
    }

    .panel {
      background: rgba(0,0,0,0.4);
      margin: 20px auto;
      padding: 20px;
      width: 420px;
      border-radius: 15px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      transform: scale(1.05);
    }

    #packVideo, #squishVideo {
      width: 100%;
      border-radius: 10px;
      display: none;
    }

    .cardBox {
      background: #222;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>brainrot pack opening simulator</h1>

<p>packs opened: <span id="packs">0</span></p>
<p id="timer"></p>

<div class="panel">

  <button onclick="openPack()">Open Pack</button>
  <button onclick="dailyPack()">Daily Pack</button>

  <video id="packVideo">
    <source src="videos/opening.mp4">
  </video>

  <div id="result"></div>

  <video id="squishVideo">
    <source src="videos/squish.mp4">
  </video>

</div>

<div class="panel">
  <h2>Inventory</h2>
  <div id="inventory"></div>
</div>

<script>

const COOLDOWN = 86400000;

let packs = parseInt(localStorage.getItem("packs")) || 0;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");
let lastDaily = parseInt(localStorage.getItem("daily") || "0");

document.getElementById("packs").innerText = packs;

const cards = {
  common: ["skibidi", "tripi tropi", "simon claw"],
  uncommon: ["bombardino crocodilo", "tung tung tung sahur", "john pork"],
  rare: ["ballerina cappucina", "cappucino assassino"],
  epic: ["tralalero tralala", "67", "tim cheese"],
  insane: ["apple pen dude"]
};

function randomCard() {
  let r = Math.random();

  let pool =
    r < 0.03 ? cards.insane :
    r < 0.08 ? cards.epic :
    r < 0.18 ? cards.rare :
    r < 0.58 ? cards.uncommon :
    cards.common;

  let name = pool[Math.floor(Math.random() * pool.length)];

  let rarity =
    cards.common.includes(name) ? "common" :
    cards.uncommon.includes(name) ? "uncommon" :
    cards.rare.includes(name) ? "rare" :
    cards.epic.includes(name) ? "epic" :
    "insane";

  return { name, rarity };
}

function save() {
  localStorage.setItem("packs", packs);
  localStorage.setItem("inv", JSON.stringify(inventory));
  localStorage.setItem("daily", lastDaily);
}

function render() {
  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((c, i) => {

    let btn = `<button onclick="sell(${i})">sell</button>`;

    if (c.name === "tung tung tung sahur") {
      btn += `<button onclick="squish()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <b>${c.name}</b><br>
        ${c.rarity}<br>
        ${btn}
      </div>
    `;
  });
}

function sell(i) {
  inventory.splice(i, 1);
  save();
  render();
}

function squish() {
  let v = document.getElementById("squishVideo");
  v.style.display = "block";
  v.currentTime = 0;
  v.play();

  v.onended = () => {
    v.style.display = "none";
  };
}

function openPack() {

  const card = randomCard();

  packs++;
  document.getElementById("packs").innerText = packs;

  save();

  let video = document.getElementById("packVideo");
  let result = document.getElementById("result");

  result.innerText = "";

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {

    video.style.display = "none";

    inventory.push(card);
    save();
    render();

    result.innerText = `You got ${card.name} (${card.rarity})`;
  };
}

function dailyPack() {

  let now = Date.now();

  if (now - lastDaily < COOLDOWN) {
    alert("Daily not ready yet!");
    return;
  }

  lastDaily = now;
  save();

  openPack();
}

function updateTimer() {
  let t = document.getElementById("timer");

  let left = COOLDOWN - (Date.now() - lastDaily);

  if (left <= 0) {
    t.innerText = "Daily ready!";
  } else {
    let h = Math.floor(left / 3600000);
    let m = Math.floor((left % 3600000) / 60000);
    let s = Math.floor((left % 60000) / 1000);

    t.innerText = `Next daily: ${h}h ${m}m ${s}s`;
  }
}

setInterval(updateTimer, 1000);

render();

</script>

</body>
</html>
