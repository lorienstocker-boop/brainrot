<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Brainrot Pack Simulator</title>

  <link rel="icon" href="meep (2).ico">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover { transform: scale(1.05); }

    #packVideo {
      width: 300px;
      border-radius: 12px;
      display: none;
      margin: 10px auto;
    }

    #squishVideo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      border-radius: 12px;
      display: none;
      z-index: 9999;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px auto;
      width: 280px;
    }

    #shelfContainer {
      width: 700px;
      margin: 20px auto;
      position: relative;
    }

    #shelfImg {
      width: 100%;
      display: block;
    }

    p, h1, h2, h3, span {
      transition: transform 0.15s ease, text-shadow 0.15s ease;
      display: inline-block;
    }

    p:hover, h1:hover, h2:hover, h3:hover, span:hover {
      transform: scale(1.08);
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    #shelfScroll {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      overflow-y: auto;
      max-height: 300px;
      padding: 10px;
    }
  </style>
</head>

<body>

<main>

<h1>brainrot pack opening simulator</h1>

<p>packs opened: <span id="count">0</span></p>
<p id="timer"></p>

<button onclick="openPack()">open pack</button>
<button onclick="claimDaily()">claim daily pack</button>
<button onclick="updateUI();">show correct coin balance</button>

<br>

<video id="packVideo" controls>
  <source src="videos/opening.mp4">
</video>

<div id="result"></div>

<img id="cardImg" style="max-width:2000px; display:none;">

<p>coins: <span id="coins">60</span></p>

<h2>inventory</h2>
<div id="inventory"></div>

<h2>global shelf</h2>

<div id="shelfContainer">
  <img id="shelfImg" src="images/shelf.png">
  <div id="shelfScroll"></div>
</div>

<video id="squishVideo" controls>
  <source src="videos/squish.mp4">
</video>

<div id="overlay"></div>

<script>

const DAILY = 11 * 60 * 60 * 1000;

let packs = parseInt(localStorage.getItem("packs")) || 0;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");
let lastDaily = parseInt(localStorage.getItem("daily")) || 0;
let coins = parseInt(localStorage.getItem("coins")) || 60;

document.getElementById("count").innerText = packs;

const Cards = {
  epic: { "tralalero tralala": "epic" },
  insane: { "apple pen dude": "insane" },
  rare: {
    "ballerina cappucina": "rare",
    "cappucino assassino": "rare",
    "tim cheese": "rare"
  },
  uncommon: {
    "bombardino crocodilo": "uncommon",
    "tung tung tung sahur": "uncommon",
    "67": "uncommon"
  },
  common: {
    "skibidi": "common",
    "tripi tropi": "common",
    "john pork": "common"
  }
};

function randomCard() {
  let r = Math.random();
  let pool =
    r < 0.03 ? Cards.insane :
    r < 0.08 ? Cards.epic :
    r < 0.18 ? Cards.rare :
    r < 0.58 ? Cards.uncommon :
    Cards.common;

  let keys = Object.keys(pool);
  let name = keys[Math.floor(Math.random() * keys.length)];
  return { name, rarity: pool[name] };
}

function value(r) {
  return { common:10, uncommon:25, rare:60, epic:150, insane:500 }[r] || 10;
}

function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("count").innerText = packs;
}

function save() {
  localStorage.setItem("inv", JSON.stringify(inventory));
  localStorage.setItem("packs", packs);
  localStorage.setItem("daily", lastDaily);
  localStorage.setItem("coins", coins);
}

function renderInventory() {
  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((c, i) => {
    let btn = `<button onclick="sell(${i})">sell</button>`;

    if (c.name === "tung tung tung sahur") {
      btn += `<button onclick="squish()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <b>${c.name}</b><br>
        ${c.rarity}<br>
        ${btn}
      </div>
    `;
  });
}

function sell(i) {
  coins += value(inventory[i].rarity);
  inventory.splice(i,1);
  save();
  updateUI();
  renderInventory();
}

function squish() {
  const video = document.getElementById("squishVideo");
  const overlay = document.getElementById("overlay");

  overlay.style.display = "block";
  video.style.display = "block";

  video.currentTime = 0;
  video.play();

  video.onended = () => {
    video.style.display = "none";
    overlay.style.display = "none";
  };
}

function openPack() {

  let card = randomCard();

  if (coins < 10) {
    alert("Not enough coins!");
    return;
  }

  coins -= 10;
  updateUI();

  packs++;
  save();

  let video = document.getElementById("packVideo");
  let img = document.getElementById("cardImg");

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {

    video.style.display = "none";

    inventory.push(card);
    save();
    renderInventory();

    img.src = "images/" + card.name + ".png";
    img.style.display = "block";

    document.getElementById("result").innerText =
      `You got ${card.name} (${card.rarity})`;
  };
}

function claimDaily() {
  let now = Date.now();

  if (now - lastDaily < DAILY) {
    alert("come back later");
    return;
  }

  lastDaily = now;
  save();
  openPack();
}

function updateTimer() {
  let el = document.getElementById("timer");
  let left = DAILY - (Date.now() - lastDaily);

  el.innerText = left <= 0
    ? "daily ready"
    : `next daily in ${Math.floor(left/3600000)}h`;
}

function renderShelf() {
  let div = document.getElementById("shelfScroll");
  div.innerHTML = "";

  inventory.forEach((c) => {
    div.innerHTML += `<div class="cardBox">${c.name}</div>`;
  });
}

setInterval(() => {
  updateTimer();
  renderShelf();
}, 1000);

renderInventory();
renderShelf();

</script>

</main>

</body>
</html>
