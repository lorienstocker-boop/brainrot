<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8" />
<title>brainrot opener - game</title>
<link rel="icon" href="meep2.ico" type="image/x-icon">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  color: white;
  text-align: center;
  background: #111;
  overflow-x: hidden;
}

#menu {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

body {
  background: url("apple.png") center/cover no-repeat fixed;
  transition: all 0.3s ease;
}

body.premium {
  background: url("images__1_-removebg-preview.png") center/cover no-repeat fixed;
}

#game {
  display: none;
  padding: 20px;
}

button {
  padding: 10px 16px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
  cursor: pointer;
}

h1, h2, h3, h4, h5, h6,
p, span, a, button, li {
  transition: 0.2s ease;
  display: inline-block;
}

h1:hover, h2:hover, h3:hover, h4:hover, h5:hover, h6:hover,
p:hover, span:hover, a:hover, button:hover, li:hover {
  color: #FF004D;
  text-shadow: 0 0 10px #ffd014;
  transform: scale(1.05);
}

#squishVideo,
#packVideo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  max-width: 90vw;
  display: none;
  z-index: 9999;
  background: black;
  border-radius: 12px;
}

.cardBox {
  background: #222;
  border-radius: 12px;
  padding: 10px;
  margin: 10px auto;
  width: 260px;
}
</style>

</head>

<body class="menu">

<div id="menu">
  <h1 style="color: red">brainrot opener</h1>
  <button onclick="startGame()">play</button>
  <button onclick="buyPremium()">buy premium</button>
</div>

<div id="game">

<h1>brainrot pack opening simulator :3 BLEHH!!</h1>

<button onclick="buyPremium()">buy premium :3</button>
<button onclick="redeemCode()">redeem code :3</button>

<p id="premiumText"></p>

<br>

<p>coins: <span id="coins">60</span></p>
<p>packs opened: <span id="count"></span></p>
<p>next daily reward in: <span id="dailyTimer"></span></p>

<br><br>

<button onclick="openPack()">open pack</button>
<button onclick="claimDaily()">claim daily reward</button>

<br><br>

<div id="result"></div>

<h2>inventory</h2>
<div id="inventory"></div>

<video id="squishVideo" controls>
  <source src="videos/squish.mp4">
</video>

<video id="packVideo" controls style="width:300px; display:none; margin:10px auto;">
  <source src="videos/opening2.mp4">
</video>

</div>

<script>

let packs = parseInt(localStorage.getItem("packs")) || 0;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");
let lastDaily = parseInt(localStorage.getItem("daily")) || 0;
let coins = parseInt(localStorage.getItem("coins")) || 60;
let premium = localStorage.getItem("premium") === "true";

const DAILY = 11 * 60 * 60 * 1000;

window.startGame = function () {
  document.body.classList.remove("menu");
  document.body.classList.add("game");
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
};

function buyPremium() {
  window.open("https://lorienstox.gumroad.com/l/attrhu", "_blank");
  premium = true;
  localStorage.setItem("premium", "true");
  updateUI();
}

function redeemCode() {
  let code = prompt("Enter code:");
  if (code === "BRAINROT2026") {
    premium = true;
    localStorage.setItem("premium", "true");
    updateUI();
    alert("premium unlocked!");
  }
}

const Cards = {

  epic: {
    "tralalero tralala": {
      rarity: "epic",
      image: "images/tralalero tralala.png"
    }
  },

  insane: {
    "apple pen dude": {
      rarity: "insane",
      image: "images/apple pen dude.png"
    }
  },

  rare: {
    "ballerina cappucina": {
      rarity: "rare",
      image: "images/ballerina cappucina.png",
      sound: "sound/balerina capuchina.mp3"
    },
    "cappucino assassino": {
      rarity: "rare",
      image: "images/cappucino assassino.png",
      sound: "sound/cappucino assassino.mp3"
    },
    "tim cheese": {
      rarity: "rare",
      image: "images/tim cheese.png"
    }
  },

  uncommon: {
    "bombardino crocodilo": {
      rarity: "uncommon",
      image: "images/bombardino crocodilo.png",
      sound: "sound/brain.mp3"
    },

    "tung tung tung sahur": {
      rarity: "uncommon",
      image: "images/tung tung tung sahur.png",
      sound: "sound/tung.mp3"
    },

    "67": {
      rarity: "uncommon",
      image: "images/67.png"
    }
  },

  common: {
    "skibidi": {
      rarity: "common",
      image: "images/skibidi.png"
    },
    "tripi tropi": {
      rarity: "common",
      image: "images/tripi tropi.png"
    },
    "john pork": {
      rarity: "common",
      image: "images/john pork.png"
    }
  }
};

function randomCard() {

  let r = Math.random();

  let pool =
    r < 0.03 ? Cards.insane :
    r < 0.08 ? Cards.epic :
    r < 0.18 ? Cards.rare :
    r < 0.58 ? Cards.uncommon :
    Cards.common;

  let keys = Object.keys(pool);
  let name = keys[Math.floor(Math.random() * keys.length)];
  let card = pool[name];

  return {
    name,
    rarity: card.rarity,
    image: card.image,
    sound: card.sound || null
  };
}

function openPack() {

  if (coins < 10) return alert("not enough coins :O");

  coins -= 10;
  packs++;

  let card = randomCard();

  let video = document.getElementById("packVideo");

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {

    video.style.display = "none";

    inventory.push(card);
    save();


    if (card.sound) {
      const sound = new Audio(card.sound);
      sound.volume = 0.7;
      sound.play();
    }

    document.getElementById("result").innerHTML = `
      <h2>You got ${card.name} (${card.rarity})</h2>
      <img src="${card.image}" style="width:220px;border-radius:15px;">
    `;

    renderInventory();
    updateUI();
  };

  updateUI();
  save();
}

function renderInventory() {

  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((c, i) => {

    div.innerHTML += `
      <div class="cardBox">

        <img src="${c.image}" style="width:180px;border-radius:10px;">

        <br><br>

        <b>${c.name}</b><br>
        ${c.rarity}<br><br>

        <button onclick="sell(${i})">sell</button>

        ${c.name === "tung tung tung sahur"
          ? `<button onclick="squish()">squish</button>`
          : ""
        }

      </div>
    `;
  });
}

function sell(i) {

  let valueMap = {
    common: 4,
    uncommon: 20,
    rare: 80,
    epic: 300,
    insane: 600
  };

  let earned = valueMap[inventory[i].rarity] || 10;

  if (premium) earned *= 2;

  coins += earned;

  inventory.splice(i, 1);

  save();
  renderInventory();
  updateUI();
}

function squish() {
  let v = document.getElementById("squishVideo");
  v.style.display = "block";
  v.play();
  v.onended = () => v.style.display = "none";
}

function claimDaily() {

  let now = Date.now();

  if (now - lastDaily < DAILY) {
    alert("daily reward not ready yet");
    return;
  }

  lastDaily = now;
  coins += 100;

  save();
  updateUI();

  alert("daily reward claimed :3 +100 coins!!!!!");
}

function updateDailyTimer() {

  let now = Date.now();
  let remaining = DAILY - (now - lastDaily);

  if (remaining <= 0) {
    document.getElementById("dailyTimer").innerText = "READY!";
    return;
  }

  let h = Math.floor(remaining / 3600000);
  let m = Math.floor((remaining % 3600000) / 60000);
  let s = Math.floor((remaining % 60000) / 1000);

  document.getElementById("dailyTimer").innerText = `${h}h ${m}m ${s}s`;
}

function save() {
  localStorage.setItem("inv", JSON.stringify(inventory));
  localStorage.setItem("packs", packs);
  localStorage.setItem("daily", lastDaily);
  localStorage.setItem("coins", coins);
}

function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("count").innerText = packs;
  document.getElementById("premiumText").innerText =
    premium ? "premium active" : "";

  if (premium) {
    document.body.classList.remove("game");
    document.body.classList.add("premium");
  }
}

setInterval(updateDailyTimer, 1000);

updateUI();
updateDailyTimer();
renderInventory();

</script>

</body>
</html>
