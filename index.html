<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>brainrot pack simulator</title>

  <link rel="icon" href="meep (2).ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .main {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .panel {
      background: rgba(0,0,0,0.35);
      padding: 20px;
      border-radius: 15px;
      width: 420px;
      backdrop-filter: blur(6px);
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin: 5px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #packVideo, #squishVideo {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px 0;
    }

    #shelfContainer {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      border-radius: 10px;
    }

    #shelfTrack {
      display: flex;
      width: max-content;
    }

    .shelfItem {
      width: 90px;
      height: 110px;
      background: #222;
      border: 2px solid white;
      border-radius: 10px;
      padding: 5px;
      margin: 10px;
      text-align: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    #shelfContainer::-webkit-scrollbar {
      display: none;
    }

    p, h1, h2, h3, span {
      transition: transform 0.15s ease, text-shadow 0.15s ease;
      display: inline-block;
    }

    p:hover, h1:hover, h2:hover, h3:hover, span:hover {
      transform: scale(1.08);
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>

<div class="header">
  <h1>brainrot pack opening simulator</h1>
  <p>Packs: <span id="packs">0</span></p>
  <p id="timer"></p>
</div>

<div class="main">

  <div class="panel">
    <h2>brainrot pack opening simulator</h2>

    <button onclick="openPack()">open 1 pack</button>
    <p id="dailyTimer"></p>

    <button id="dailyBtn" onclick="claimDailyPack()">
    claim daily pack
    </button>

    <div id="result"></div>
    
    <video id="squishVideo" style="display:none;">
      <source src="videos/squish.mp4">
    </video>

    <video id="packVideo" style="display:none;">
      <source src="videos/opening.mp4">
    </video>

    <img id="cardImg" style="display:none; max-width:250px;">
  </div>

  <div class="panel">
    <h2>inventory</h2>
    <div id="inventory"></div>
  </div>

</div>

<div class="panel" style="width:700px; margin:auto;">
  <h2>global shelf</h2>

  <button onclick="loadShelf()">refresh shelf</button>

  <div id="shelfContainer">
    <div id="shelfTrack"></div>
  </div>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://istttzdbafsurjrefdwm.supabase.co",
  "sb_publishable_4bjO8-2p6WIw0XxU8zDg9Q_Ydpffo8t"
);

let packs = parseInt(localStorage.getItem("packs")) || 0;
let coins = parseInt(localStorage.getItem("coins")) || 60;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");

document.getElementById("packs").innerText = packs;

const Cards = {
  epic: {
    "tralalero tralala": "epic",
    "tim cheese": "epic"
  },

  insane: {
    "apple pen dude": "insane"
  },

  rare: {
    "ballerina cappucina": "rare",
    "cappucino assassino": "rare"
  },

  uncommon: {
    "bombardino crocodilo": "uncommon",
    "tung tung tung sahur": "uncommon",
    "simon claw": "uncommon"
  },

  common: {
    "skibidi": "common",
    "tripi tropi": "common",
    "john pork": "common"
  }
};

function save() {
  localStorage.setItem("packs", packs);
  localStorage.setItem("coins", coins);
  localStorage.setItem("inv", JSON.stringify(inventory));
}

function randomCard() {

  const roll = Math.random();

  let pool =
    roll < 0.03 ? Cards.insane :
    roll < 0.08 ? Cards.epic :
    roll < 0.18 ? Cards.rare :
    roll < 0.58 ? Cards.uncommon :
    Cards.common;

  const keys = Object.keys(pool);

  const name =
    keys[Math.floor(Math.random() * keys.length)];

  return {
    name,
    rarity: pool[name]
  };
}

function value(rarity) {
  return {
    common: 10,
    uncommon: 25,
    rare: 60,
    epic: 150,
    insane: 500
  }[rarity] || 10;
}

function renderInventory() {

  const div = document.getElementById("inventory");

  div.innerHTML = `<p>coins: ${coins}</p>`;

  inventory.forEach((card, i) => {

    let buttons = `<button onclick="sell(${i})">sell</button>`;

    if (card.name === "tung tung tung sahur") {
      buttons += `<button onclick="squish()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <b>${card.name}</b><br>
        ${card.rarity}<br><br>
        ${buttons}
      </div>
    `;
  });
}

function sell(i) {
  coins += value(inventory[i].rarity);
  inventory.splice(i, 1);
  save();
  renderInventory();
}

function squish() {
  const video = document.getElementById("squishVideo");
  video.style.display = "block";
  video.currentTime = 0;
  video.play();
  video.onended = () => video.style.display = "none";
}

async function addToShelf(card) {
  await supabaseClient.from("shelf").insert([card]);
}

let shelfData = [];

async function loadShelf() {

  const { data, error } =
    await supabaseClient
      .from("shelf")
      .select("*")
      .order("id", { ascending: false });

  if (error) return console.log(error);

  shelfData = data || [];

  const track = document.getElementById("shelfTrack");

  track.innerHTML = "";


  const loopData = shelfData.concat(shelfData);

  loopData.forEach(item => {
    track.innerHTML += `
      <div class="shelfItem">
        ${item.name}
      </div>
    `;
  });
}


const container = document.getElementById("shelfContainer");

setInterval(() => {
  if (!container) return;

  const half = container.scrollWidth / 2;

  if (container.scrollLeft >= half) {
    container.scrollLeft = 0;
  }
}, 50);


function openPack(free = false) {

  const card = randomCard();

  packs++;

  document.getElementById("packs").innerText = packs;

  save();

  const video = document.getElementById("packVideo");
  const result = document.getElementById("result");
  const img = document.getElementById("cardImg");

  result.innerText = "";
  img.style.display = "none";

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = async () => {

    video.style.display = "none";

    inventory.push(card);
    save();
    renderInventory();

    await addToShelf(card);
    loadShelf();

    result.innerText = `You got ${card.name} (${card.rarity})`;

    img.src = `images/${card.name}.png`;
    img.style.display = "block";
  };
}

renderInventory();
loadShelf();
setInterval(loadShelf, 4000);

</script>

<script>
const dailyBtn = document.getElementById("dailyBtn");
const dailyTimer = document.getElementById("dailyTimer");

const COOLDOWN = 24 * 60 * 60 * 1000;

function claimDailyPack() {
  const lastClaim = localStorage.getItem("dailyClaim");

  if (lastClaim && Date.now() - lastClaim < COOLDOWN) {
    alert("Daily pack not ready yet!");
    return;
  }

  localStorage.setItem("dailyClaim", Date.now());

  alert("You claimed your daily pack!");
  openPack();
  updateDailyTimer();
}

function updateDailyTimer() {
  const lastClaim = localStorage.getItem("dailyClaim");

  if (!lastClaim) {
    dailyBtn.disabled = false;
    dailyTimer.innerText = "Daily pack ready!";
    return;
  }

  const timeLeft = COOLDOWN - (Date.now() - lastClaim);

  if (timeLeft <= 0) {
    dailyBtn.disabled = false;
    dailyTimer.innerText = "Daily pack ready!";
    return;
  }

  dailyBtn.disabled = true;

  const hours = Math.floor(timeLeft / (1000 * 60 * 60));
  const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

  dailyTimer.innerText =
    `Next free pack in ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateDailyTimer, 1000);
updateDailyTimer();
</script>

</body>
</html>
