<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8" />
<title>brainrot opener - game</title>

<link rel="icon" href="meep (2).ico">

<style>

  p, h1, h2, h3, span {
    transition: transform 0.15s ease, text-shadow 0.15s ease;
    display: inline-block;
  }

  p:hover, h1:hover, h2:hover, h3:hover, span:hover {
  transform: scale(1.08);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

body.menu {
  background: url("menu-bg.jpg") center/cover no-repeat;
}

body.game {
  background: linear-gradient(90deg, #FFD014, #805280);
}

body.premium {
  background: url("premium-bg.png") center/cover no-repeat;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 5px;
}

button:hover { transform: scale(1.05); }

.cardBox {
  background: #222;
  border: 2px solid white;
  border-radius: 12px;
  padding: 10px;
  margin: 10px auto;
  width: 280px;
}


#game {
  display: none;
}

#squishVideo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  display: none;
  z-index: 9999;
}

</style>
</head>

<body class="menu">


<div id="menu">
  <h1>brainrot opener</h1>
  <button onclick="startGame()">play</button>
  <button onclick="buyPremium()">buy premium :3</button>
</div>


<div id="game">

<h1>brainrot pack opening simulator :3 BLEHH!!</h1>

<button onclick="buyPremium()">buy premium :3</button>
<button onclick="redeemCode()">redeem code :3</button>

<p id="premiumText"></p>

<p>coins: <span id="coins">60</span></p>
<p>packs opened: <span id="count">0</span></p>

<button onclick="openPack()">open pack</button>
<button onclick="claimDaily()">claim daily pack</button>

<div id="result"></div>

<div id="inventory"></div>

<video id="squishVideo" controls>
  <source src="videos/squish.mp4">
</video>

<video id="packVideo" controls style="width:300px; display:none; margin:10px auto;">
  <source src="videos/opening.mp4">
</video>

</div>

<script>


let packs = parseInt(localStorage.getItem("packs")) || 0;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");
let lastDaily = parseInt(localStorage.getItem("daily")) || 0;
let coins = parseInt(localStorage.getItem("coins")) || 60;
let premium = localStorage.getItem("premium") === "true";

const DAILY = 11 * 60 * 60 * 1000;
window.startGame = function () {

  document.body.classList.remove("menu");
  document.body.classList.add("game");

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
};

function buyPremium() {
  window.open("https://lorienstox.gumroad.com/l/attrhu", "_blank");
  premium = true;
  localStorage.setItem("premium", "true");
  updateUI();
}

function redeemCode() {
  let code = prompt("Enter code:");
  if (code === "BRAINROT2026") {
    premium = true;
    localStorage.setItem("premium", "true");
    updateUI();
    alert("premium unlocked!");
  }
}


function openPack() {
  if (coins < 10) return alert("not enough coins :O");

  coins -= 10;
  packs++;

  let card = randomCard();

  let video = document.getElementById("packVideo");
  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {
    video.style.display = "none";

    inventory.push(card);
    save();

    document.getElementById("result").innerText =
      `You got ${card.name} (${card.rarity})`;

    renderInventory();
    updateUI();
  };

  updateUI();
  save();
}


const Cards = {
  epic: { "tralalero tralala": "epic" },
  insane: { "apple pen dude": "insane" },
  rare: {
    "ballerina cappucina": "rare",
    "cappucino assassino": "rare",
    "tim cheese": "rare"
  },
  uncommon: {
    "bombardino crocodilo": "uncommon",
    "tung tung tung sahur": "uncommon",
    "67": "uncommon"
  },
  common: {
    "skibidi": "common",
    "tripi tropi": "common",
    "john pork": "common"
  }
};

function randomCard() {
  let r = Math.random();
  let pool =
    r < 0.03 ? Cards.insane :
    r < 0.08 ? Cards.epic :
    r < 0.18 ? Cards.rare :
    r < 0.58 ? Cards.uncommon :
    Cards.common;

  let keys = Object.keys(pool);
  let name = keys[Math.floor(Math.random() * keys.length)];
  return { name, rarity: pool[name] };
}


function renderInventory() {
  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((c, i) => {
    div.innerHTML += `
      <div class="cardBox">
        <b>${c.name}</b><br>
        ${c.rarity}<br>
        <button onclick="sell(${i})">sell</button>
        ${c.name === "tung tung tung sahur" ? `<button onclick="squish()">squish</button>` : ""}
      </div>
    `;
  });
}


function sell(i) {
  let valueMap = { common:4, uncommon:20, rare:80, epic:300, insane:600 };
  let earned = valueMap[inventory[i].rarity] || 10;

  if (premium) earned *= 2;

  coins += earned;
  inventory.splice(i, 1);

  save();
  renderInventory();
  updateUI();
}

  
function squish() {
  let v = document.getElementById("squishVideo");
  v.style.display = "block";
  v.play();

  v.onended = () => v.style.display = "none";
}


function save() {
  localStorage.setItem("inv", JSON.stringify(inventory));
  localStorage.setItem("packs", packs);
  localStorage.setItem("daily", lastDaily);
  localStorage.setItem("coins", coins);
}


function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("count").innerText = packs;

  document.getElementById("premiumText").innerText =
    premium ? "premium active :3" : "";

  if (premium) document.body.classList.add("premium");
}


updateUI();
renderInventory();

</script>

</body>
</html>
