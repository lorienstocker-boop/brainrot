<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>brainrot opener - game</title>

  <link rel="icon" href="meep (2).ico">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      text-align: center;
    }

    body.premium {
      background: url("images__1_-removebg-preview.png") center/cover no-repeat;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover { transform: scale(1.05); }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px auto;
      width: 280px;
    }

    #shelfScroll {
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<h1>brainrot pack opening simulator</h1>

<button onclick="openPack()">open pack</button>
<button onclick="claimDaily()">daily</button>
<button onclick="buyPremium()">buy premium</button>

<p>coins: <span id="coins">60</span></p>
<p id="premiumText"></p>

<div id="inventory"></div>

<h2>global shelf</h2>
<div id="shelfScroll"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>


const supabase = window.supabase?.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);


let coins = 60;
let premium = false;
let inventory = [];
let globalInventory = [];


const Cards = {
  common: { "skibidi": "common", "john pork": "common" },
  uncommon: { "tung sahur": "uncommon" },
  rare: { "cappucino assassin": "rare" },
  epic: { "tralalero": "epic" },
  insane: { "apple pen dude": "insane" }
};


function randomCard() {
  let r = Math.random();
  let pool =
    r < 0.03 ? Cards.insane :
    r < 0.08 ? Cards.epic :
    r < 0.18 ? Cards.rare :
    r < 0.58 ? Cards.uncommon :
    Cards.common;

  let keys = Object.keys(pool);
  let name = keys[Math.floor(Math.random() * keys.length)];

  return { name, rarity: pool[name] };
}


function save() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("premium", premium);
}


function openPack() {
  if (coins < 10) return alert("not enough coins");

  coins -= 10;

  let card = randomCard();
  inventory.push(card);

  if (supabase) {
    supabase.from("inventory").insert({
      item_name: card.name,
      rarity: card.rarity
    }).then(loadShelf);
  }

  render();
}


function claimDaily() {
  openPack();
}


function buyPremium() {
  premium = true;
  document.body.classList.add("premium");
  save();
  render();
}


async function loadShelf() {
  if (!supabase) return;

  let { data } = await supabase
    .from("inventory")
    .select("*")
    .order("id", { ascending: false });

  globalInventory = data || [];
  renderShelf();
}


function render() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("premiumText").innerText =
    premium ? "premium active" : "";

  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach(c => {
    div.innerHTML += `<div class="cardBox">${c.name}</div>`;
  });
}

function renderShelf() {
  let div = document.getElementById("shelfScroll");
  div.innerHTML = "";

  globalInventory.forEach(c => {
    div.innerHTML += `<div class="cardBox">${c.item_name}</div>`;
  });
}


render();
loadShelf();

</script>

</body>
</html>
