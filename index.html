<!DOCTYPE html>
<html>

<head>
  <link rel="icon" href="meep (2).ico">
  <title>brainrot booster pack opening simulation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      padding: 30px;
    }

    

    #packVideo, #squishVideo {
      transition: transform 0.2s;
    }

    #packVideo:hover {
      transform: scale(1.1);
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    img {
      margin-top: 20px;
      max-width: 300px;
      border-radius: 12px;
    }

    #result {
      font-size: 24px;
      margin-top: 25px;
    }

    #inventory {
      margin-top: 40px;
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 15px;
      padding: 15px;
      margin: 15px auto;
      width: 350px;
    }

    p, h1, h2, h3, span {
  transition: transform 0.15s ease, text-shadow 0.15s ease;
  display: inline-block;
}

p:hover, h1:hover, h2:hover, h3:hover, span:hover {
  transform: scale(1.08);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
  </style>
</head>

<body>

  <h1>brainrot booster pack opening simulation</h1>

  <button onclick="openPack()">Open Pack</button>
  <button onclick="claimDailyPack()">Free Daily Pack!!! :3</button>

  <p>total packs opened: <span id="count">0</span></p>
  <p id="dailyTimer"></p>

  <h2>Global Shelf</h2>
  <button onclick="loadShelf()">Refresh Shelf</button>
  <div id="shelf"></div>

  <video id="packVideo" width="500" style="display:none;">
    <source src="videos/opening.mp4" type="video/mp4">
  </video>

  <video id="squishVideo" width="500" style="display:none;">
    <source src="videos/squish.mp4" type="video/mp4">
  </video>

  <div id="result"></div>
  <div id="outcome"></div>

  <img id="cardImage" src="" style="display:none;">

  <div id="inventory">
    <h2>Inventory</h2>
  </div>

<script>

  

const DAILY_COOLDOWN = 24 * 60 * 60 * 1000;

let packsOpened = parseInt(localStorage.getItem("packsOpened")) || 0;
let inventory = JSON.parse(localStorage.getItem("inventory") || "[]");
let coins = parseInt(localStorage.getItem("coins")) || 60;

document.getElementById("count").textContent = packsOpened;

const epicCards = { "tralalero tralala": "epic" };

const insaneCards = {
  "apple pen dude": "insane"
};

const rareCards = {
  "ballerina cappucina": "rare",
  "cappucino assassino": "rare",
  "67": "rare"
};

const uncommonCards = {
  "bombardino crocodilo": "uncommon",
  "tung tung tung sahur": "uncommon"
};

const commonCards = {
  "tripi tropi": "common",
  "skibidi": "common"
};

  const supabaseUrl = "https://istttzdbafsurjrefdwm.supabase.co";
const supabaseKey = "sb_publishable_4bjO8-2p6WIw0XxU8zDg9Q_Ydpffo8t";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);


  async function addToShelf(card) {
  await supabase.from("shelf").insert([
    {
      name: card.name,
      rarity: card.rarity
    }
  ]);

  loadShelf();
}

  async function loadShelf() {
  const { data, error } = await supabase
    .from("shelf")
    .select("*")
    .order("id", { ascending: false });

  const shelfDiv = document.getElementById("shelf");
  shelfDiv.innerHTML = "";

  data.forEach(item => {
    shelfDiv.innerHTML += `
      <div class="cardBox">
        <h3>${item.name}</h3>
        <p>${item.rarity}</p>
      </div>
    `;
  });
}

function saveGame() {
  localStorage.setItem("inventory", JSON.stringify(inventory));
  localStorage.setItem("coins", coins);
  localStorage.setItem("packsOpened", packsOpened);
}

function chooseRandomCard(cards) {
  const keys = Object.keys(cards);
  const card = keys[Math.floor(Math.random() * keys.length)];
  return { name: card, rarity: cards[card] };
}

function getCardValue(rarity) {
  const values = {
    common: 10,
    uncommon: 25,
    rare: 60,
    epic: 150,
    insane: 500
  };

  return values[rarity] ?? 10;
}

function addCardToInventory(card) {
  inventory.push(card);
  saveGame();
  renderInventory();
}

function sellCard(index) {
  coins += getCardValue(inventory[index].rarity);
  inventory.splice(index, 1);
  saveGame();
  renderInventory();
}

function squishCard() {
  const video = document.getElementById("squishVideo");

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = function () {
    video.style.display = "none";
  };
}

function renderInventory() {
  const div = document.getElementById("inventory");

  div.innerHTML = `
    <h2>Inventory</h2>
    <h3>Coins: ${coins}</h3>
  `;

  inventory.forEach((card, index) => {
    const isTung = card.name === "tung tung tung sahur";

    let buttons = `<button onclick="sellCard(${index})">sell</button>`;

    if (isTung) {
      buttons += `<button onclick="squishCard()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <h3>${card.name}</h3>
        <p>Rarity: ${card.rarity}</p>
        <p>Value: ${getCardValue(card.rarity)}</p>
        ${buttons}
      </div>
    `;
  });

  if (inventory.length === 0) {
    div.innerHTML += `<p>No cards yet.</p>`;
  }
}

function canClaimDaily() {
  const last = localStorage.getItem("lastDailyPack");
  if (!last) return true;
  return Date.now() - parseInt(last) > DAILY_COOLDOWN;
}

function claimDailyPack() {
  if (!canClaimDaily()) {
    alert("Come back later!");
    return;
  }

  localStorage.setItem("lastDailyPack", Date.now());
  openPack(true);
}

function updateDailyTimer() {
  const timer = document.getElementById("dailyTimer");
  if (!timer) return;

  const last = localStorage.getItem("lastDailyPack");

  if (!last) {
    timer.innerText = "daily pack: ready!";
    return;
  }

  const timeLeft = DAILY_COOLDOWN - (Date.now() - parseInt(last));

  if (timeLeft <= 0) {
    timer.innerText = "daily pack: ready!";
    return;
  }

  const hours = Math.floor(timeLeft / (1000 * 60 * 60));
  const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

  timer.innerText = `next daily pack in ${hours}h ${minutes}m ${seconds}s`;
}

function openPack(free = false) {

  if (!free) {
    if (coins < 20) return alert("not enough coins");
    coins -= 20;
  }

  packsOpened++;
  document.getElementById("count").textContent = packsOpened;
  addToShelf(card);

  saveGame();

  const roll = Math.random();
  let cards;

  if (roll < 0.03) cards = insaneCards;
  else if (roll < 0.08) cards = epicCards;
  else if (roll < 0.18) cards = rareCards;
  else if (roll < 0.58) cards = uncommonCards;
  else cards = commonCards;

  const card = chooseRandomCard(cards);

  const video = document.getElementById("packVideo");
  const result = document.getElementById("result");
  const image = document.getElementById("cardImage");
  const outcome = document.getElementById("outcome");

  setInterval(loadShelf, 3000);
  loadShelf();



  result.innerText = "";
  outcome.innerText = "";
  image.style.display = "none";

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = function () {

    video.style.display = "none";

    result.innerText = `You got ${card.name} (${card.rarity})`;

    image.src = `images/${card.name}.png`;
    image.style.display = "block";

    const value = getCardValue(card.rarity);

    outcome.innerText =
      value >= 500 ? "SUPER WIN!!!!!!" :
      value < 20 ? "LOSE" : "WIN!";

    outcome.style.color =
      value >= 500 ? "gold" :
      value < 20 ? "red" : "lime";

    addCardToInventory(card);
  };
}

renderInventory();
updateDailyTimer();
setInterval(updateDailyTimer, 1000);

</script>

</body>
</html>

</body>
</html>
