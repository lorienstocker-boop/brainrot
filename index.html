<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>brainrot opener - game</title>

  <link rel="icon" href="meep (2).ico">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      text-align: center;
    }

    body.premium {
      background: url("images__1_-removebg-preview.png") center/cover no-repeat;
    }

    h1 { margin-top: 20px; }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover { transform: scale(1.05); }

    #packVideo {
      width: 300px;
      border-radius: 12px;
      display: none;
      margin: 10px auto;
    }

    #squishVideo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      border-radius: 12px;
      display: none;
      z-index: 9999;
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px auto;
      width: 280px;
    }

    #shelfContainer {
      width: 700px;
      margin: 20px auto;
      position: relative;
    }

    #shelfScroll {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      overflow-y: auto;
      max-height: 300px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>brainrot pack opening simulator</h1>

<button onclick="buyPremium()">buy premium</button>
<button onclick="redeemCode()">redeem code</button>

<p id="premiumText"></p>

<p>coins: <span id="coins">60</span></p>
<p>packs opened: <span id="count">0</span></p>

<button onclick="openPack()">open pack</button>
<button onclick="claimDaily()">claim daily pack</button>

<video id="packVideo" controls>
  <source src="videos/opening.mp4">
</video>

<div id="result"></div>

<img id="cardImg" style="max-width:2000px; display:none;">

<h2>inventory</h2>
<div id="inventory"></div>

<h2>global shelf</h2>

<div id="shelfContainer">
  <div id="shelfScroll"></div>
  <img id="shelfImg" src="images/shelf.png">
</div>

<video id="squishVideo" controls>
  <source src="videos/squish.mp4">
</video>

<script>

let packs = parseInt(localStorage.getItem("packs")) || 0;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");
let lastDaily = parseInt(localStorage.getItem("daily")) || 0;
let coins = parseInt(localStorage.getItem("coins")) || 60;
let premium = localStorage.getItem("premium") === "true";

const DAILY = 11 * 60 * 60 * 1000;

document.getElementById("count").innerText = packs;

const Cards = {
  epic: { "tralalero tralala": "epic" },
  insane: { "apple pen dude": "insane" },
  rare: {
    "ballerina cappucina": "rare",
    "cappucino assassino": "rare",
    "tim cheese": "rare"
  },
  uncommon: {
    "bombardino crocodilo": "uncommon",
    "tung tung tung sahur": "uncommon",
    "67": "uncommon"
  },
  common: {
    "skibidi": "common",
    "tripi tropi": "common",
    "john pork": "common"
  }
};

function randomCard() {
  let r = Math.random();
  let pool =
    r < 0.03 ? Cards.insane :
    r < 0.08 ? Cards.epic :
    r < 0.18 ? Cards.rare :
    r < 0.58 ? Cards.uncommon :
    Cards.common;

  let keys = Object.keys(pool);
  let name = keys[Math.floor(Math.random() * keys.length)];
  return { name, rarity: pool[name] };
}

function save() {
  localStorage.setItem("inv", JSON.stringify(inventory));
  localStorage.setItem("packs", packs);
  localStorage.setItem("daily", lastDaily);
  localStorage.setItem("coins", coins);
  localStorage.setItem("premium", premium);
}

function buyPremium() {
  window.open("https://your-gumroad-link-here.com", "_blank");
}

function redeemCode() {
  let code = prompt("Enter code:");
  if (code === "BRAINROT2026") {
    premium = true;
    save();
    updateUI();
    alert("premium unlocked!");
  } else {
    alert("invalid code");
  }
}

function openPack() {

  if (coins < 10) return alert("not enough coins");

  coins -= 10;
  packs++;

  let card = randomCard();

  let video = document.getElementById("packVideo");
  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {

    video.style.display = "none";

    inventory.push(card);
    save();

    renderInventory();
    renderShelf();

    document.getElementById("result").innerText =
      `You got ${card.name} (${card.rarity})`;
  };

  updateUI();
  save();
}

function claimDaily() {
  let now = Date.now();

  if (now - lastDaily < DAILY) {
    alert("come back later");
    return;
  }

  lastDaily = now;
  save();
  openPack();
}

function squish() {
  const video = document.getElementById("squishVideo");
  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {
    video.style.display = "none";
  };
}

function value(r) {
  return { common:4, uncommon:20, rare:80, epic:300, insane:600 }[r] || 10;
}

function sell(i) {
  let earned = value(inventory[i].rarity);

  if (premium) earned *= 2;

  coins += earned;
  inventory.splice(i, 1);

  save();
  updateUI();
  renderInventory();
  renderShelf();
}

function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("premiumText").innerText =
    premium ? "premium active :3" : "";

  if (premium) {
  document.body.classList.add("premium");
}
}

function renderInventory() {
  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((c, i) => {

    let btn = `<button onclick="sell(${i})">sell</button>`;

    if (c.name === "tung tung tung sahur") {
      btn += `<button onclick="squish()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <b>${c.name}</b><br>
        ${c.rarity}<br>
        ${btn}
      </div>
    `;
  });
}

function renderShelf() {
  let div = document.getElementById("shelfScroll");
  div.innerHTML = "";

  inventory.forEach(c => {
    div.innerHTML += `<div class="cardBox">${c.name}</div>`;
  });
}

updateUI();
renderInventory();
renderShelf();

</script>

</body>
</html>
