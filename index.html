<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>brainrot pack opening simulator</title>
  <title>Brainrot Pack Simulator</title>

  <link rel="icon" href="meep (2).ico">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(90deg, #FFD014, #805280);
      color: white;
      text-align: center;
    }

    .panel {
      background: rgba(0,0,0,0.4);
      margin: 20px auto;
      padding: 20px;
      width: 420px;
      border-radius: 15px;
    }
    h1 { margin-top: 20px; }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      transform: scale(1.05);
    }
    button:hover { transform: scale(1.05); }

    #packVideo, #squishVideo {
      width: 100%;
      border-radius: 10px;
      width: 300px;
      border-radius: 12px;
      display: none;
      margin: 10px auto;
    }

    .cardBox {
      background: #222;
      border: 2px solid white;
      border-radius: 12px;
      padding: 10px;
      margin: 10px auto;
      width: 280px;
    }

    #shelfContainer {
      width: 700px;
      margin: 20px auto;
      position: relative;
    }

    #shelfImg {
      width: 100%;
      display: block;
    }

    #shelfScroll {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;

      overflow-y: auto;
      max-height: 300px;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>brainrot pack opening simulator</h1>

<p>packs opened: <span id="packs">0</span></p>
<p>packs opened: <span id="count">0</span></p>
<p id="timer"></p>

<div class="panel">
<button onclick="openPack()">open pack</button>
<button onclick="claimDaily()">daily pack</button>

  <button onclick="openPack()">open pack</button>
  <button onclick="dailyPack()">daily pack</button>
<br>

  <video id="packVideo">
    <source src="videos/opening.mp4">
  </video>
<video id="packVideo" controls>
  <source src="videos/opening.mp4">
</video>

  <div id="result"></div>
<div id="result"></div>

  <video id="squishVideo">
    <source src="videos/squish.mp4">
  </video>
<img id="cardImg" style="max-width:200px; display:none;">

</div>
<h2>inventory</h2>
<div id="inventory"></div>

<div class="panel">
  <h2>inventory</h2>
  <div id="inventory"></div>
<h2>global shelf</h2>

<div id="shelfContainer">
  <img id="shelfImg" src="images/shelf.png">
  <div id="shelfScroll"></div>
</div>

<video id="squishVideo" controls>
  <source src="videos/squish.mp4">
</video>

<script>

const COOLDOWN = 86400000;
const DAILY = 24 * 60 * 60 * 1000;

let packs = parseInt(localStorage.getItem("packs")) || 0;
let inventory = JSON.parse(localStorage.getItem("inv") || "[]");
let lastDaily = parseInt(localStorage.getItem("daily") || "0");

document.getElementById("packs").innerText = packs;

const cards = {
  common: ["skibidi", "tripi tropi", "simon claw"],
  uncommon: ["bombardino crocodilo", "tung tung tung sahur", "john pork"],
  rare: ["ballerina cappucina", "cappucino assassino"],
  epic: ["tralalero tralala", "67", "tim cheese"],
  insane: ["apple pen dude"]
let lastDaily = parseInt(localStorage.getItem("daily")) || 0;

document.getElementById("count").innerText = packs;

const Cards = {
  epic: { "tralalero tralala": "epic" },
  insane: { "apple pen dude": "insane" },
  rare: {
    "ballerina cappucina": "rare",
    "cappucino assassino": "rare"
  },
  uncommon: {
    "bombardino crocodilo": "uncommon",
    "tung tung tung sahur": "uncommon"
  },
  common: {
    "skibidi": "common",
    "tripi tropi": "common"
  }
};

function randomCard() {
  let r = Math.random();

  let pool =
    r < 0.03 ? cards.insane :
    r < 0.08 ? cards.epic :
    r < 0.18 ? cards.rare :
    r < 0.58 ? cards.uncommon :
    cards.common;

  let name = pool[Math.floor(Math.random() * pool.length)];

  let rarity =
    cards.common.includes(name) ? "common" :
    cards.uncommon.includes(name) ? "uncommon" :
    cards.rare.includes(name) ? "rare" :
    cards.epic.includes(name) ? "epic" :
    "insane";

  return { name, rarity };
    r < 0.03 ? Cards.insane :
    r < 0.08 ? Cards.epic :
    r < 0.18 ? Cards.rare :
    r < 0.58 ? Cards.uncommon :
    Cards.common;

  let keys = Object.keys(pool);
  let name = keys[Math.floor(Math.random() * keys.length)];
  return { name, rarity: pool[name] };
}

function value(r) {
  return { common:10, uncommon:25, rare:60, epic:150, insane:500 }[r] || 10;
}

function save() {
  localStorage.setItem("packs", packs);
  localStorage.setItem("inv", JSON.stringify(inventory));
  localStorage.setItem("packs", packs);
  localStorage.setItem("daily", lastDaily);
}

function render() {
function renderInventory() {
  let div = document.getElementById("inventory");
  div.innerHTML = "";

  inventory.forEach((c, i) => {

    let btn = `<button onclick="sell(${i})">sell</button>`;

    if (c.name === "tung tung tung sahur") {
      btn += `<button onclick="squish()">squish</button>`;
    }

    div.innerHTML += `
      <div class="cardBox">
        <b>${c.name}</b><br>
        ${c.rarity}<br>
        ${btn}
      </div>
    `;
  });
}

function sell(i) {
  inventory.splice(i, 1);
  inventory.splice(i,1);
  save();
  render();
  renderInventory();
}

function squish() {
  let v = document.getElementById("squishVideo");
  v.style.display = "block";
  v.currentTime = 0;
  v.play();

  v.onended = () => {
    v.style.display = "none";
  };
  v.onended = () => v.style.display = "none";
}

function openPack() {

  const card = randomCard();
  let card = randomCard();

  packs++;
  document.getElementById("packs").innerText = packs;

  document.getElementById("count").innerText = packs;
  save();

  let video = document.getElementById("packVideo");
  let result = document.getElementById("result");

  result.innerText = "";
  let img = document.getElementById("cardImg");

  video.style.display = "block";
  video.currentTime = 0;
  video.play();

  video.onended = () => {

    video.style.display = "none";

    inventory.push(card);
    save();
    render();
    renderInventory();

    result.innerText = `You got ${card.name} (${card.rarity})`;
    img.src = "images/" + card.name + ".png";
    img.style.display = "block";

    document.getElementById("result").innerText =
      `You got ${card.name} (${card.rarity})`;
  };
}

function dailyPack() {

function claimDaily() {
  let now = Date.now();

  if (now - lastDaily < COOLDOWN) {
    alert("Daily not ready yet!");
  if (now - lastDaily < DAILY) {
    alert("come back later");
    return;
  }

  lastDaily = now;
  save();

  openPack();
}

function updateTimer() {
  let t = document.getElementById("timer");
  let el = document.getElementById("timer");
  let left = DAILY - (Date.now() - lastDaily);

  let left = COOLDOWN - (Date.now() - lastDaily);
  el.innerText = left <= 0
    ? "daily ready"
    : `next daily in ${Math.floor(left/3600000)}h`;
}

  if (left <= 0) {
    t.innerText = "Daily ready!";
  } else {
    let h = Math.floor(left / 3600000);
    let m = Math.floor((left % 3600000) / 60000);
    let s = Math.floor((left % 60000) / 1000);
function renderShelf() {
  let div = document.getElementById("shelfScroll");
  div.innerHTML = "";

    t.innerText = `Next daily: ${h}h ${m}m ${s}s`;
  }
  inventory.forEach((c, i) => {
    div.innerHTML += `
      <div class="cardBox">
        ${c.name}
      </div>
    `;
  });
}

setInterval(updateTimer, 1000);
setInterval(() => {
  updateTimer();
  renderShelf();
}, 1000);

render();
renderInventory();
renderShelf();

</script>

</body>
</html>
